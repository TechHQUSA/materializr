name: Linux Build

# Builds the Linux AppImage on x86_64 (ubuntu-22.04) and aarch64 (ubuntu-24.04
# -arm), uploads each as a workflow artifact, and on a published GitHub Release
# attaches both AppImages to the release's download list.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'packaging/**'
      - '.github/workflows/windows.yml'
  workflow_dispatch:
  release:
    types: [ published ]

# A new push on main cancels the previous build still in flight — older runs
# wouldn't ship anyway.
concurrency:
  group: linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  appimage:
    name: AppImage (${{ matrix.arch }})
    # `contents: write` lets action-gh-release attach the AppImages to a
    # published Release. Without it the attach step fails with "Resource not
    # accessible by integration" — which is exactly how the aarch64 (and CI
    # x86_64) assets silently vanished from every release after v0.3.x.
    # windows.yml has carried this block all along.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch:   x86_64
          - runner: ubuntu-24.04-arm
            arch:   aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # The runners come with Docker pre-installed and BuildKit enabled — the
      # build script just shells out to `docker build`. Native build on each
      # arch (no QEMU emulation), so the aarch64 run is real-time, not glacial.
      - name: Verify Docker
        run: docker version

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Show output
        run: ls -lh dist/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Materializr-linux-${{ matrix.arch }}
          path: |
            dist/Materializr-${{ matrix.arch }}.AppImage
            dist/Materializr-${{ matrix.arch }}.AppImage.zsync

      # The .zsync MUST ship beside the AppImage on the release: AppImageUpdate /
      # Gear Lever read the embedded gh-releases-zsync info, then fetch this
      # control file from the latest release to delta-update.
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Materializr-${{ matrix.arch }}.AppImage
            dist/Materializr-${{ matrix.arch }}.AppImage.zsync
