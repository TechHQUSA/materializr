name: Feature request
description: Suggest a capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Materializr aims for the middle ground between dead-simple and
        fully-featured — genuine parametric modeling without the bloat. Ideas
        that fit that spirit are very welcome.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The task or pain point, not just the proposed button. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you imagine it working. Sketches/screenshots welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds / alternatives
      description: How you handle it now, or other tools that do it well.
    validations:
      required: false
