# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json
PackageIdentifier: Materializr.Materializr
PackageVersion: 1.2.7
# NSIS installer (packaging/windows/installer.nsi) → winget type "nullsoft",
# which implies the "/S" silent switch. It installs machine-wide to
# %ProgramFiles%\Materializr and requires elevation (RequestExecutionLevel admin).
InstallerType: nullsoft
Scope: machine
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
Installers:
  - Architecture: x64
    InstallerUrl: https://github.com/materializr-cad/materializr/releases/download/v1.2.7/Materializr-Setup.exe
    # NOTE: placeholder SHA from v1.2.6 — update from the v1.2.7 Setup.exe once
    # CI builds it (see the follow-up "winget: set … SHA256" commit), before
    # submitting the winget PR.
    InstallerSha256: E09FA723AE51F6AA8B138DAF1D7591283C0DA392BC47EE19FE12E92C51587476
    # The NSIS script writes these ARP values; the installer tags DisplayVersion
    # with the tag name (leading "v") via /DAPPVERSION=${github.ref_name}.
    AppsAndFeaturesEntries:
      - DisplayName: Materializr
        Publisher: Materializr
        DisplayVersion: v1.2.7
ManifestType: installer
ManifestVersion: 1.6.0
